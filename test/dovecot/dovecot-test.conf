# Drop-in configuration for the EmailEngine Dovecot live-test container (same
# setup as the ImapFlow rev2 live suite). Mounted into /etc/dovecot/conf.d/ of
# the dovecot/dovecot:2.4.x image, which already ships with
# imap4rev2_enable = yes and mail_utf8_extensions = yes.

# The account connects over plain TCP on the container-internal IMAP port
# (31143), so cleartext logins must be allowed
auth_allow_cleartext = yes

# Special-use mailboxes, auto-created and subscribed for every test user
namespace inbox {
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
}
