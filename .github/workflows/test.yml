name: Run Tests

on:
    push:
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Skip CI for release-please's auto-generated release PR / branch: it only bumps the
    # version + CHANGELOG (no code change), so re-running the suite is wasted work. This is
    # gated per job rather than with [skip ci] in the release commit, because that text would
    # ride the squash-merge into master and skip the Manage Release run, breaking releases.
    license_check:
        name: License Compliance Check
        if: ${{ !startsWith(github.ref_name, 'release-please--') && !startsWith(github.head_ref, 'release-please--') }}
        runs-on: ubuntu-24.04
        # Service containers to run with `container-job`
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm install

            - name: Run License Checks
              run: |
                  npm run licenses

    lint:
        name: Lint
        if: ${{ !startsWith(github.ref_name, 'release-please--') && !startsWith(github.head_ref, 'release-please--') }}
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm install
            - name: Run ESLint
              run: |
                  npm run lint

    unit:
        name: Unit Tests
        if: ${{ !startsWith(github.ref_name, 'release-please--') && !startsWith(github.head_ref, 'release-please--') }}
        timeout-minutes: 10
        runs-on: ubuntu-24.04
        # Service containers to run with `container-job`
        services:
            # Label used to access the service container
            redis:
                # Docker Hub image
                image: redis
                # Set health checks to wait until redis has started
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Setup Redis CLI
              uses: shogo82148/actions-setup-redis@v1
              with:
                  redis-version: '7.x'
                  auto-start: 'false'
            - run: npm install
            - name: Run unit tests
              run: |
                  npm run test:unit
              env:
                  NODE_ENV: test
                  # account-revoke-on-delete-test.js runs against live Gmail when
                  # these are present and skips itself when they are not
                  GMAIL_API_PROJECT_ID: ${{ secrets.TEST_GMAIL_API_PROJECT_ID }}
                  GMAIL_API_CLIENT_ID: ${{ secrets.TEST_GMAIL_API_CLIENT_ID }}
                  GMAIL_API_CLIENT_SECRET: ${{ secrets.TEST_GMAIL_API_CLIENT_SECRET }}
                  GMAIL_API_SERVICE_EMAIL: ${{ secrets.TEST_GMAIL_API_SERVICE_EMAIL }}
                  GMAIL_API_SERVICE_CLIENT: ${{ secrets.TEST_GMAIL_API_SERVICE_CLIENT }}
                  GMAIL_API_SERVICE_KEY: ${{ secrets.TEST_GMAIL_API_SERVICE_KEY }}
                  GMAIL_API_ACCOUNT_EMAIL_1: ${{ secrets.TEST_GMAIL_API_ACCOUNT_EMAIL_1 }}
                  GMAIL_API_ACCOUNT_REFRESH_1: ${{ secrets.TEST_GMAIL_API_ACCOUNT_REFRESH_1 }}

    dovecot:
        # Live IMAP tier against a real IMAP4rev2 server (Dovecot 2.4 in Docker);
        # fully hermetic - needs no external mail accounts. See test/dovecot/README.md
        name: Live Dovecot Tests (IMAP4rev2)
        if: ${{ !startsWith(github.ref_name, 'release-please--') && !startsWith(github.head_ref, 'release-please--') }}
        timeout-minutes: 15
        runs-on: ubuntu-24.04
        services:
            redis:
                image: redis
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm install
            - name: Run live Dovecot tests
              run: |
                  npm run test:dovecot
              env:
                  EENGINE_DOVECOT_PLATFORM: linux/amd64

    integration:
        name: Integration Tests
        if: ${{ !startsWith(github.ref_name, 'release-please--') && !startsWith(github.head_ref, 'release-please--') }}
        timeout-minutes: 15 # Increased timeout for Gmail API tests
        runs-on: ubuntu-24.04
        # Service containers to run with `container-job`
        services:
            # Label used to access the service container
            redis:
                # Docker Hub image
                image: redis
                # Set health checks to wait until redis has started
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Setup Redis CLI
              uses: shogo82148/actions-setup-redis@v1
              with:
                  redis-version: '7.x'
                  auto-start: 'false'
            - run: npm install
            - name: Run integration tests
              run: |
                  npm run test:integration
              env:
                  NODE_ENV: test
                  GMAIL_API_PROJECT_ID: ${{ secrets.TEST_GMAIL_API_PROJECT_ID }}
                  GMAIL_API_CLIENT_ID: ${{ secrets.TEST_GMAIL_API_CLIENT_ID }}
                  GMAIL_API_CLIENT_SECRET: ${{ secrets.TEST_GMAIL_API_CLIENT_SECRET }}
                  GMAIL_API_SERVICE_EMAIL: ${{ secrets.TEST_GMAIL_API_SERVICE_EMAIL }}
                  GMAIL_API_SERVICE_CLIENT: ${{ secrets.TEST_GMAIL_API_SERVICE_CLIENT }}
                  GMAIL_API_SERVICE_KEY: ${{ secrets.TEST_GMAIL_API_SERVICE_KEY }}
                  GMAIL_API_ACCOUNT_EMAIL_1: ${{ secrets.TEST_GMAIL_API_ACCOUNT_EMAIL_1 }}
                  GMAIL_API_ACCOUNT_REFRESH_1: ${{ secrets.TEST_GMAIL_API_ACCOUNT_REFRESH_1 }}
                  GMAIL_API_ACCOUNT_EMAIL_2: ${{ secrets.TEST_GMAIL_API_ACCOUNT_EMAIL_2 }}
                  GMAIL_API_ACCOUNT_REFRESH_2: ${{ secrets.TEST_GMAIL_API_ACCOUNT_REFRESH_2 }}
                  GMAIL_SENDONLY_PROJECT_ID: ${{ secrets.GMAIL_SENDONLY_PROJECT_ID }}
                  GMAIL_SENDONLY_CLIENT_ID: ${{ secrets.GMAIL_SENDONLY_CLIENT_ID }}
                  GMAIL_SENDONLY_CLIENT_SECRET: ${{ secrets.GMAIL_SENDONLY_CLIENT_SECRET }}
                  GMAIL_SENDONLY_ACCOUNT_EMAIL: ${{ secrets.GMAIL_SENDONLY_ACCOUNT_EMAIL }}
                  GMAIL_SENDONLY_ACCOUNT_REFRESH: ${{ secrets.GMAIL_SENDONLY_ACCOUNT_REFRESH }}
                  OUTLOOK_SERVICE_CLIENT_ID: ${{ secrets.OUTLOOK_SERVICE_CLIENT_ID }}
                  OUTLOOK_SERVICE_TENANT_ID: ${{ secrets.OUTLOOK_SERVICE_TENANT_ID }}
                  OUTLOOK_SERVICE_CLIENT_SECRET: ${{ secrets.OUTLOOK_SERVICE_CLIENT_SECRET }}
                  OUTLOOK_SERVICE_ACCOUNT_EMAIL: ${{ secrets.OUTLOOK_SERVICE_ACCOUNT_EMAIL }}
                  GMAIL_SERVICE_POSTALSYS_CLIENT: ${{ secrets.GMAIL_SERVICE_POSTALSYS_CLIENT }}
                  GMAIL_SERVICE_POSTALSYS_SERVICE_EMAIL: ${{ secrets.GMAIL_SERVICE_POSTALSYS_SERVICE_EMAIL }}
                  GMAIL_SERVICE_POSTALSYS_KEY: ${{ secrets.GMAIL_SERVICE_POSTALSYS_KEY }}
                  GMAIL_SERVICE_POSTALSYS_ACCOUNT_EMAIL: ${{ secrets.GMAIL_SERVICE_POSTALSYS_ACCOUNT_EMAIL }}
                  GMAIL_WIF_SA_KEY: ${{ secrets.GMAIL_WIF_SA_KEY }}
                  GMAIL_WIF_AUDIENCE: ${{ secrets.GMAIL_WIF_AUDIENCE }}
                  GMAIL_WIF_ACCOUNT_EMAIL: ${{ secrets.GMAIL_WIF_ACCOUNT_EMAIL }}
