on:
    push:
        branches:
            - master

name: Deploy test instance and Docker image

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        name: Deploy Demo App
        runs-on: ubuntu-24.04
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install SSH key
              uses: shimataro/ssh-key-action@v2
              with:
                  key: ${{ secrets.SSH_KEY }}
                  known_hosts: ${{ secrets.KNOWN_HOSTS }}

            - name: Deploy to server
              env:
                  TARGET_HOST_02: dev.emailengine.app
                  NODE_ENV: production
                  SERVICE_NAME: emailengine
              id: deploy
              run: |
                  echo $GITHUB_SHA > commit.txt
                  EE_COMMIT_HASH=$GITHUB_SHA ./update-info.sh
                  npm install --omit=dev
                  tar czf /tmp/${SERVICE_NAME}.tar.gz --exclude .git .
                  scp -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" /tmp/${SERVICE_NAME}.tar.gz deploy@${TARGET_HOST_02}:
                  ssh -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" deploy@$TARGET_HOST_02 "/opt/deploy.sh ${SERVICE_NAME}"

            - name: Deploy to demo server
              env:
                  TARGET_HOST_02: dev.emailengine.app
                  NODE_ENV: production
                  SERVICE_NAME: emailengine-demo
              id: deploy-demo
              run: |
                  echo $GITHUB_SHA > commit.txt
                  EE_COMMIT_HASH=$GITHUB_SHA ./update-info.sh
                  npm install --omit=dev
                  tar czf /tmp/${SERVICE_NAME}.tar.gz --exclude .git .
                  scp -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" /tmp/${SERVICE_NAME}.tar.gz deploy@${TARGET_HOST_02}:
                  ssh -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" deploy@$TARGET_HOST_02 "/opt/deploy.sh ${SERVICE_NAME}"

    docker:
        name: Build Docker Image
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: 'arm64,arm'

            - name: Set up Docker Buildx
              id: buildx
              uses: docker/setup-buildx-action@v4
              with:
                  platforms: linux/amd64,linux/arm64/v8

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: |
                      ${{ github.repository }}
                      ghcr.io/${{ github.repository }}
                  # :latest is owned by the release workflow (release.yaml) and
                  # always points at the newest release; per-push dev builds from
                  # master are published as :edge instead
                  tags: |
                      type=raw,value=edge,enable=true

            - name: Build and push
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: ${{ steps.buildx.outputs.platforms }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  # Without a cache backend BuildKit starts cold on every run: setup-buildx-action
                  # creates a fresh builder on an ephemeral runner, so the emulated arm64 `npm ci`
                  # re-runs in full regardless of how the Dockerfile layers are ordered.
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # The Dockerfile copies an explicit allowlist of root-level files, so a CLI subcommand
            # that dispatches to one can be missing from the image while the build and the server
            # both stay green - CMD only runs server.js. Both `scan` and `encrypt` shipped broken
            # that way. Exercising the commands catches it regardless of how the module is
            # referenced, which a source-level check cannot.
            #
            # Pinned to the digest this run produced, not the :edge tag - concurrent pushes to
            # master overwrite :edge, so a tag-based pull can smoke test a different run's image.
            - name: Smoke test the CLI inside the image
              run: |
                  set -euo pipefail
                  image="ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
                  docker pull -q "$image"
                  status=0
                  # Only the subcommands that dispatch to a root-level module can exercise the
                  # allowlist; everything else resolves out of lib/ or node_modules.
                  for cmd in scan encrypt; do
                      # These need Redis or arguments and are expected to fail; we only assert that
                      # the module resolved, so a missing COPY cannot pass silently.
                      out=$(docker run --rm --entrypoint node "$image" bin/emailengine.js "$cmd" 2>&1 || true)
                      if grep -q "Cannot find module" <<<"$out"; then
                          echo "::error::emailengine $cmd cannot resolve its module inside the image"
                          printf '%s\n' "$out"
                          status=1
                      fi
                  done
                  exit $status
