on:
    push:
        branches:
            - master

name: Deploy test instance and Docker image

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        name: Deploy Demo App
        runs-on: ubuntu-24.04
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install SSH key
              uses: shimataro/ssh-key-action@v2
              with:
                  key: ${{ secrets.SSH_KEY }}
                  known_hosts: ${{ secrets.KNOWN_HOSTS }}

            - name: Deploy to server
              env:
                  TARGET_HOST_02: dev.emailengine.app
                  NODE_ENV: production
                  SERVICE_NAME: emailengine
              id: deploy
              run: |
                  echo $GITHUB_SHA > commit.txt
                  EE_COMMIT_HASH=$GITHUB_SHA ./update-info.sh
                  npm install --omit=dev
                  tar czf /tmp/${SERVICE_NAME}.tar.gz --exclude .git .
                  scp -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" /tmp/${SERVICE_NAME}.tar.gz deploy@${TARGET_HOST_02}:
                  ssh -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" deploy@$TARGET_HOST_02 "/opt/deploy.sh ${SERVICE_NAME}"

            - name: Deploy to demo server
              env:
                  TARGET_HOST_02: dev.emailengine.app
                  NODE_ENV: production
                  SERVICE_NAME: emailengine-demo
              id: deploy-demo
              run: |
                  echo $GITHUB_SHA > commit.txt
                  EE_COMMIT_HASH=$GITHUB_SHA ./update-info.sh
                  npm install --omit=dev
                  tar czf /tmp/${SERVICE_NAME}.tar.gz --exclude .git .
                  scp -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" /tmp/${SERVICE_NAME}.tar.gz deploy@${TARGET_HOST_02}:
                  ssh -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" deploy@$TARGET_HOST_02 "/opt/deploy.sh ${SERVICE_NAME}"

    docker:
        name: Build Docker Image
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: 'arm64,arm'

            - name: Set up Docker Buildx
              id: buildx
              uses: docker/setup-buildx-action@v4
              with:
                  platforms: linux/amd64,linux/arm64/v8

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: |
                      ${{ github.repository }}
                      ghcr.io/${{ github.repository }}
                  # :latest is owned by the release workflow (release.yaml) and
                  # always points at the newest release; per-push dev builds from
                  # master are published as :edge instead
                  tags: |
                      type=raw,value=edge,enable=true

            # Build the amd64 image locally (no push) and smoke test the CLI BEFORE publishing, so a
            # broken image is never pushed - the previous version smoke tested the already-pushed
            # image and could only detect the regression, not prevent shipping it. This build replays
            # from the same gha cache the multi-arch push below reuses, so it is cheap.
            - name: Build for smoke test (amd64, local)
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: linux/amd64
                  load: true
                  tags: emailengine:smoke-test
                  # Without a cache backend BuildKit starts cold on every run: setup-buildx-action
                  # creates a fresh builder on an ephemeral runner, so the emulated arm64 `npm ci`
                  # re-runs in full regardless of how the Dockerfile layers are ordered.
                  cache-from: type=gha

            - name: Smoke test the CLI inside the image
              run: bash .github/docker-smoke-test.sh emailengine:smoke-test

            - name: Build and push
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: ${{ steps.buildx.outputs.platforms }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
