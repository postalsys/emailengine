name: "EmailEngine CodeQL config"

# Exclude code that is not part of the production runtime from analysis.
# These paths generate only false-positive noise:
#   - test fixtures intentionally disable TLS verification, build shell
#     commands from fixed paths, etc.
#   - vendored third-party browser assets (Bootstrap and other bundles) ship
#     with their own known patterns and are not maintained here
#   - developer helper scripts (e.g. test-token refresh) deliberately print
#     tokens to the console for local debugging
paths-ignore:
    - test
    - '**/test/**'
    - scripts
    - static/bootstrap-4.6.2-dist
    - static/vendor

# Exclude the clear-text-logging query. It has produced only false positives in
# this codebase (60+ dismissed, no true positives): CodeQL taints whole account
# objects because they carry an `oauth2` sub-object, then follows benign
# identifier fields (account id, connection state) that get read off the same
# object into ordinary log lines. The credential fields themselves are never
# logged - real secrets are redacted via formatPartialSecretKey() before any
# logging. The taint is an over-approximation of dynamic/nested property access
# that code-level guards do not reliably break, so the query is disabled here
# rather than dismissed alert-by-alert (which recurs whenever log lines move).
query-filters:
    - exclude:
        id: js/clear-text-logging
